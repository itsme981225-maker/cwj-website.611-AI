<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待辦事項實作</title>
    <link rel="stylesheet" href="styleAI611.css">
    <!-- 使用 defer 確保 DOM 解析完成後才執行 JS -->
    <script src="scriptAI611.js" defer></script>
</head>
<body>

    <div class="todo-container">
        <h1>我的待辦事項</h1>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="請輸入提醒事項">
            <input type="datetime-local" id="todo-time">
            <button onclick="addTodo()">確定新增</button>
        </div>
        <ul id="todo-list"></ul>
    </div>

</body>
</html>
